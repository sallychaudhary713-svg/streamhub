openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Movie site API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: movies
    description: Movie operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /movies:
    get:
      operationId: listMovies
      tags: [movies]
      summary: List all movies
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
            enum: [Bollywood, Hollywood, Series, LiveTV]
        - name: search
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of movies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Movie"
    post:
      operationId: createMovie
      tags: [movies]
      summary: Add a new movie
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MovieInput"
      responses:
        "201":
          description: Created movie
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Movie"

  /movies/{id}:
    get:
      operationId: getMovie
      tags: [movies]
      summary: Get a single movie
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Movie detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Movie"
        "404":
          description: Not found
    patch:
      operationId: updateMovie
      tags: [movies]
      summary: Update an existing movie
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MovieInput"
      responses:
        "200":
          description: Updated movie
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Movie"
        "404":
          description: Not found
    delete:
      operationId: deleteMovie
      tags: [movies]
      summary: Delete a movie
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted successfully
        "404":
          description: Not found

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Movie:
      type: object
      required:
        - id
        - title
        - category
        - embedUrl
        - downloadUrl
        - quality
        - createdAt
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        category:
          type: string
          enum: [Bollywood, Hollywood, Series, LiveTV]
        embedUrl:
          type: string
        downloadUrl:
          type: string
        posterUrl:
          type: ["string", "null"]
        quality:
          type: string
          enum: [HD, "CAM Rip"]
        createdAt:
          type: string
          format: date-time

    MovieInput:
      type: object
      required:
        - title
        - category
        - embedUrl
        - downloadUrl
        - quality
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        category:
          type: string
          enum: [Bollywood, Hollywood, Series, LiveTV]
        embedUrl:
          type: string
          minLength: 1
        downloadUrl:
          type: string
          minLength: 1
        posterUrl:
          type: string
        quality:
          type: string
          enum: [HD, "CAM Rip"]
